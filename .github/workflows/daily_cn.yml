name: Daily CN Report

on:
  schedule:
    - cron: "0 8 * * 1-5" # 16:00 Asia/Shanghai weekdays
  workflow_dispatch:
    inputs:
      date:
        description: "Run date in YYYY-MM-DD"
        required: false
        type: string

concurrency:
  group: llm-stock-report-cn
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
      GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta' }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://127.0.0.1:11434' }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'qwen2.5:7b' }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
      REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || 'zh' }}
      STOCK_LIST_CN: ${{ vars.STOCK_LIST_CN }}
      STOCK_LIST_US: ${{ vars.STOCK_LIST_US }}
      STOCK_LIST_HK: ${{ vars.STOCK_LIST_HK }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
      MAX_STOCKS_PER_RUN: ${{ vars.MAX_STOCKS_PER_RUN || '30' }}
      DETAIL_MESSAGE_CHAR_LIMIT: ${{ vars.DETAIL_MESSAGE_CHAR_LIMIT || '3500' }}
      MODEL_EXPIRE_DAYS: ${{ vars.MODEL_EXPIRE_DAYS || '8' }}
      MARKET_INDEX_FETCH_ENABLED: ${{ vars.MARKET_INDEX_FETCH_ENABLED || 'true' }}
      TRAINING_WINDOW_DAYS: ${{ vars.TRAINING_WINDOW_DAYS || '730' }}
      FEATURE_WARMUP_DAYS: ${{ vars.FEATURE_WARMUP_DAYS || '60' }}
      HISTORY_PRUNE_BUFFER_DAYS: ${{ vars.HISTORY_PRUNE_BUFFER_DAYS || '60' }}
      INCREMENTAL_OVERLAP_DAYS: ${{ vars.INCREMENTAL_OVERLAP_DAYS || '7' }}
      FETCH_MAX_RETRIES: ${{ vars.FETCH_MAX_RETRIES || '5' }}
      FETCH_RETRY_BASE_DELAY_SECONDS: ${{ vars.FETCH_RETRY_BASE_DELAY_SECONDS || '15' }}
      FETCH_RETRY_MAX_DELAY_SECONDS: ${{ vars.FETCH_RETRY_MAX_DELAY_SECONDS || '300' }}
      FETCH_RETRY_JITTER_SECONDS: ${{ vars.FETCH_RETRY_JITTER_SECONDS || '2' }}
      LLM_MAX_RETRIES: ${{ vars.LLM_MAX_RETRIES || '6' }}
      LLM_RETRY_BASE_DELAY_SECONDS: ${{ vars.LLM_RETRY_BASE_DELAY_SECONDS || '5' }}
      LLM_RETRY_MAX_DELAY_SECONDS: ${{ vars.LLM_RETRY_MAX_DELAY_SECONDS || '120' }}
      LLM_RETRY_JITTER_SECONDS: ${{ vars.LLM_RETRY_JITTER_SECONDS || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CN report
        run: |
          RUN_DATE="${{ github.event.inputs.date }}"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          fi
          echo "RUN_DATE=$RUN_DATE" >> "$GITHUB_ENV"
          python -m app.jobs.run_report --market cn --date "$RUN_DATE"

      - name: Export case for Pages
        if: always()
        continue-on-error: true
        run: |
          python -m app.jobs.export_case --market cn --date "$RUN_DATE"

      - name: Commit Pages case data
        if: always()
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain pages_data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pages_data
            git commit -m "chore(pages): update cn case ${RUN_DATE}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No pages_data changes to commit."
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cn-report-${{ github.run_id }}
          path: |
            outputs/**
            models/**
          retention-days: 14
