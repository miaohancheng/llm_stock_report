name: Daily HK Report

on:
  schedule:
    - cron: "30 9 * * 1-5" # 17:30 Asia/Shanghai weekdays
  workflow_dispatch:
    inputs:
      date:
        description: "Run date in YYYY-MM-DD"
        required: false
        type: string

concurrency:
  group: llm-stock-report-hk
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      STOCK_LIST_CN: ${{ vars.STOCK_LIST_CN }}
      STOCK_LIST_US: ${{ vars.STOCK_LIST_US }}
      STOCK_LIST_HK: ${{ vars.STOCK_LIST_HK }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
      MAX_STOCKS_PER_RUN: ${{ vars.MAX_STOCKS_PER_RUN || '30' }}
      DETAIL_MESSAGE_CHAR_LIMIT: ${{ vars.DETAIL_MESSAGE_CHAR_LIMIT || '3500' }}
      MODEL_EXPIRE_DAYS: ${{ vars.MODEL_EXPIRE_DAYS || '8' }}
      TRAINING_WINDOW_DAYS: ${{ vars.TRAINING_WINDOW_DAYS || '730' }}
      FEATURE_WARMUP_DAYS: ${{ vars.FEATURE_WARMUP_DAYS || '60' }}
      HISTORY_PRUNE_BUFFER_DAYS: ${{ vars.HISTORY_PRUNE_BUFFER_DAYS || '60' }}
      INCREMENTAL_OVERLAP_DAYS: ${{ vars.INCREMENTAL_OVERLAP_DAYS || '7' }}
      FETCH_MAX_RETRIES: ${{ vars.FETCH_MAX_RETRIES || '5' }}
      FETCH_RETRY_BASE_DELAY_SECONDS: ${{ vars.FETCH_RETRY_BASE_DELAY_SECONDS || '15' }}
      FETCH_RETRY_MAX_DELAY_SECONDS: ${{ vars.FETCH_RETRY_MAX_DELAY_SECONDS || '300' }}
      FETCH_RETRY_JITTER_SECONDS: ${{ vars.FETCH_RETRY_JITTER_SECONDS || '2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run HK report
        run: |
          RUN_DATE="${{ github.event.inputs.date }}"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          fi
          python -m app.jobs.run_report --market hk --date "$RUN_DATE"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hk-report-${{ github.run_id }}
          path: |
            outputs/**
            models/**
          retention-days: 14
